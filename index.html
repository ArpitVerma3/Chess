<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/index.css" />
    <script
      src="https://cdn.socket.io/4.8.3/socket.io.min.js"
      integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
      crossorigin="anonymous"
    ></script>
    <title>Chess</title>
  </head>

  <body>
    <div id="total-players" class="player-count">Total Players: 0</div>
    <div class="app-container">
      <div class="layout-container">
        <h1 class="app-title">AV Chess Zero</h1>
        <div id="root"></div>

        <div id="clock1"></div>
        <select name="mode" id="gameMode">
          <option value="Bullet">Bullet (1 min)</option>
          <option value="Blitz">Blitz (3 min)</option>
          <option value="Rapid">Rapid (10 min)</option>
        </select>
        <div id="clock2"></div>

        <div class="sidebar">
          <div class="sidebar-header">Match History</div>
          <div id="move-history" class="move-history"></div>
          <div class="sidebar-footer">
            <button class="action-btn" onclick="location.reload()">
              Restart Game
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="game-over" class="game-over" style="display: none">
      <div class="game-over-box">
        <h1 id="game-over-message">White Wins</h1>
        <button id="restart-btn" onclick="location.reload()">Play Again</button>
      </div>
    </div>

    <script type="module" src="Javascript/index.js"></script>
  </body>
</html>
